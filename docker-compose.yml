services:
  browser:
    build: ./browser
    ports:
      - "6080:6080"   # noVNC
      - "9222:9222"   # CDP
    shm_size: 2gb
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:6080/ || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crawler
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/crawler
      API_VERSION: "0.1.0"
      REPORTS_DIR: /app/reports
      BROWSER_NOVNC_URL: http://localhost:6080
      BROWSER_CDP_URL: http://browser:9222
      AUTH_CHECK_URL: https://httpbin.org/cookies
    volumes:
      - ./backend/reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
